name: Revoke member

# Operator-run: remove a member's allowlist entry + invite code from KV, so they
# can no longer authorize and their issued OAuth token stops resolving. Needs only
# CLOUDFLARE_API_TOKEN (same fork setup as Onboard). To also delete their data,
# remove users/<username>/ from the data repo manually (its web UI).

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username to revoke"
        required: true
      invite_code:
        description: "Their invite code to delete (optional)"
        required: false

jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove from KV (allowlist + invite)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          U: ${{ inputs.username }}
          CODE: ${{ inputs.invite_code }}
        run: |
          npx --yes wrangler kv key delete --binding=TENANT_KV --remote "tenant:${U}" || true
          if [ -n "$CODE" ]; then
            npx --yes wrangler kv key delete --binding=TENANT_KV --remote "invite:${CODE}" || true
          fi

      - name: Summary
        run: echo "Revoked \`${{ inputs.username }}\` — KV allowlist + invite removed; their token no longer resolves. Delete \`users/${{ inputs.username }}/\` from the data repo manually if you want their data gone too." >> "$GITHUB_STEP_SUMMARY"

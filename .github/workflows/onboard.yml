name: Onboard member

# Operator-run provisioning (no local tooling, no GitHub App key needed). Mints a
# member's invite code + allowlist entry in KV. Their users/<username>/ subtree is
# created lazily on their first write (e.g. when they set their Kroger store) — the
# commit engine creates files at any path. Run from this (forked) repo's Actions
# tab; workflow_dispatch is restricted to users with write access.
#
# One-time setup on the fork: secret CLOUDFLARE_API_TOKEN (also used by Deploy
# Worker) + enable Actions. The KV binding is read from wrangler.jsonc.

on:
  workflow_dispatch:
    inputs:
      username:
        description: "New member's username (their tenant id + users/<username> subtree)"
        required: true
      invite_code:
        description: "Invite code to mint (leave blank to generate a random one)"
        required: false

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve invite code
        id: code
        run: |
          code="${{ inputs.invite_code }}"
          if [ -z "$code" ]; then code="$(openssl rand -hex 8)"; fi
          echo "value=$code" >> "$GITHUB_OUTPUT"

      - name: Allowlist + mint invite (KV)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          U: ${{ inputs.username }}
          CODE: ${{ steps.code.outputs.value }}
        run: |
          npx --yes wrangler kv key put --binding=TENANT_KV --remote "tenant:${U}" "{\"id\":\"${U}\"}"
          npx --yes wrangler kv key put --binding=TENANT_KV --remote "invite:${CODE}" "${U}"

      - name: Summary
        run: |
          {
            echo "## Onboarded \`${{ inputs.username }}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Invite code | \`${{ steps.code.outputs.value }}\` |"
            echo "| Connector URL | \`https://<your-worker-host>/mcp\` |"
            echo ""
            echo "Send them the invite code + connector URL, and \`AGENT_INSTRUCTIONS.md\` to paste into their Claude.ai Project. They enter the code at \`/authorize\`, then run their Kroger consent at \`/oauth/init?tenant=${{ inputs.username }}\`. Their \`users/${{ inputs.username }}/\` subtree is created automatically on their first write (e.g. setting their store)."
            echo ""
            echo "> The invite code is visible in this run to anyone with repo access. For a trusted group that's fine; rotate it by re-running with a new code if needed."
          } >> "$GITHUB_STEP_SUMMARY"
